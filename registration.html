    <main>
        <section>
            <h1>Learner Registration</h1>
            <p>Please fill out the form below to enroll a child in the Mabopane Community Swim Initiative.</p>
            
            <form action="#" method="post">
                <fieldset>
                    <legend>Guardian Information</legend>
                    <label for="parentName">Parent/Guardian Name:</label>
                    <input type="text" id="parentName" name="parentName" required>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </fieldset>

                <fieldset>
                    <legend>Learner Details</legend>
                    <label for="childName">Child's Name:</label>
                    <input type="text" id="childName" name="childName" required>

                    <label for="age">Child's Age:</label>
                    <input type="number" id="age" name="age" min="5" max="18">

                    <label for="level">Swimming Level:</label>
                    <select id="level" name="level">
                        <option value="beginner">Beginner (No experience)</option>
                        <option value="intermediate">Intermediate (Can float)</option>
                        <option value="advanced">Advanced (Can swim laps)</option>
                    </select>
                </fieldset>

                <button type="submit" class="submit-btn">Submit Registration</button>
            </form>
        </section>
    </main>
