    <meta name="keywords" content="swim registration Mabopane, enroll child swimming, free aquatic safety">

    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>

                <li><a href="registration.html" class="active">Register</a></li>

            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1>Learner Registration</h1>
            <p>Please complete the enrollment form below. All fields are cross-validated for processing safety.</p>
            
            <form id="registrationForm" action="#" method="post" novalidate>
                <fieldset>
                    <legend>Guardian Information</legend>
                    
                    <label for="parentName">Parent/Guardian Full Name:</label>
                    <input type="text" id="parentName" name="parentName">
                    <span id="parentNameError" class="error-text"></span>

                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email">
                    <span id="emailError" class="error-text"></span>
                </fieldset>

                <fieldset>
                    <legend>Learner Details</legend>
                    
                    <label for="childName">Child's Full Name:</label>
                    <input type="text" id="childName" name="childName">
                    <span id="childNameError" class="error-text"></span>

                    <label for="age">Child's Age (5 - 18):</label>
                    <input type="number" id="age" name="age">
                    <span id="ageError" class="error-text"></span>

                    <label for="level">Swimming Competency Level:</label>
                    <select id="level" name="level">
                        <option value="">-- Select Level --</option>
                        <option value="beginner">Beginner (No experience)</option>
                        <option value="intermediate">Intermediate (Can float)</option>
                        <option value="advanced">Advanced (Can swim laps)</option>
                    </select>
                    <span id="levelError" class="error-text"></span>
                </fieldset>

                <button type="submit" class="submit-btn">Submit Registration</button>
            </form>
        </section>
    </main>

</html>
