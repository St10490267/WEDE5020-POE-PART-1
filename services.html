    <main>
        <h1>Our Swimming Programmes</h1>
        <p>Use the controls below to dynamically search, filter, and sort through our available training tracks.</p>

        <div class="filter-toolbar" style="margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; background-color: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #e0e0e0;">
            <div style="flex: 1; min-width: 200px;">
                <label for="searchBar" style="display: block; font-weight: bold; margin-bottom: 5px;">Search Programmes:</label>
                <input type="text" id="searchBar" placeholder="Type to filter e.g. Safety, Beginner..." style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="min-width: 180px;">
                <label for="sortSelector" style="display: block; font-weight: bold; margin-bottom: 5px;">Sort By Minimum Age:</label>
                <select id="sortSelector" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="default">Default Order</option>
                    <option value="age-asc">Age: Low to High</option>
                    <option value="age-desc">Age: High to Low</option>
                </select>
            </div>
        </div>

        <div id="programmes-container" class="accordion-container">
            </div>
    </main>
